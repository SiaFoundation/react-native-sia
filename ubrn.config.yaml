---
rust:
  repo: https://github.com/SiaFoundation/sia-sdk-rs
  branch: master
  manifestPath: sia_storage_ffi/Cargo.toml
# 32-bit ABIs (armeabi-v7a, x86) are excluded — Play Store has required
# 64-bit since 2019 and 64-bit-only since 2024. They would add ~141 MB
# to the npm tarball for zero real-device coverage.
android:
  targets: [arm64-v8a, x86_64]
