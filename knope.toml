# Release automation. Mirrors the other SiaFoundation JS repos (sia-storage-js,
# create-sia-app): change files accumulate in .changeset/, `prepare-release`
# rolls them into a release PR, and `release` (run when that PR merges) cuts the
# GitHub release that triggers the npm publish build.

[package]
versioned_files = ["package.json"]
changelog = "CHANGELOG.md"

[github]
owner = "SiaFoundation"
repo = "react-native-sia"

[[workflows]]
name = "prepare-release"

[[workflows.steps]]
type = "Command"
command = "git switch -c release"

[[workflows.steps]]
type = "PrepareRelease"
# We don't use conventional commits to drive versioning — only the explicit
# .changeset/*.md files (which check-sdk-update.yml and humans write).
ignore_conventional_commits = true

[[workflows.steps]]
# Knope's JSON writer can drop package.json's trailing newline; re-normalize.
type = "Command"
command = "node scripts/format-package.mjs"

[[workflows.steps]]
type = "Command"
command = "git add -A"

[[workflows.steps]]
type = "Command"
command = "git commit -m 'chore: release'"

[[workflows.steps]]
type = "Command"
command = "git push --force --set-upstream origin release"

[[workflows.steps]]
type = "Command"
command = "node scripts/create-release-pr.mjs"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"
