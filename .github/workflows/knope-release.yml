# When the release PR (head branch `release`) is merged, cut the GitHub release
# + tag. That release's `published` event triggers release-main.yml, which builds
# the native artifacts and publishes to npm.
name: Knope Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write # create the release + tag

jobs:
  release:
    if: github.head_ref == 'release' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          version: 0.22.2

      # RELEASE_PAT (not GITHUB_TOKEN) so the `release: published` event it emits
      # triggers release-main.yml — events from GITHUB_TOKEN don't fire workflows.
      - run: knope release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
