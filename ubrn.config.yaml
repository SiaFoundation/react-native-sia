---
rust:
  repo: https://github.com/SiaFoundation/sia-sdk-rs
  # Pinned to a release tag (not master). check-sdk-update.yml bumps this when
  # a newer sia_storage_ffi release ships.
  branch: sia_storage_ffi/v0.8.1
  manifestPath: sia_storage_ffi/Cargo.toml
# armeabi-v7a (32-bit ARM) ships because some 64-bit-capable phones run a
# 32-bit Android userspace and load only 32-bit libs (e.g. Samsung Galaxy
# J6 / Exynos 7870). Without this ABI those devices can't load the native
# lib and react-native-sia throws on startup — a blank white screen.
# x86 stays excluded: it's emulator-only, and 64-bit emulators cover dev.
android:
  targets: [arm64-v8a, armeabi-v7a, x86_64]
