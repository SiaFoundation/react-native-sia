[package]
name = "sia_lib"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "staticlib", "lib"]

[dependencies]
anyhow = "1.0.99"
quinn = "0.11.8"
rustls = { version = "0.23.31", default-features = false, features = ["ring"] }
serde_json = "1.0.142"
sia_sdk = { git = "https://github.com/SiaFoundation/sia-sdk-rs", rev = "766f9bc" }
tokio= { version = "^1.47.1", features = ["rt-multi-thread", "macros", "time", "net"] }
uniffi = "0.29.4"
thiserror = "1.0.64"

[build-dependencies]
uniffi = { version = "0.29.4", features = ["build"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
